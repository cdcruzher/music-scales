        // --- CORE MUSIC THEORY ENGINE ---

        const NOTES_SHARP = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const NOTES_FLAT = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];

        const LETTERS = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
        const LETTER_PITCHES = [0, 2, 4, 5, 7, 9, 11];

        // Decodificador de Notación
        const parseNote = (noteName) => {
            const letter = noteName.charAt(0);
            const letterIdx = LETTERS.indexOf(letter);
            let alt = 0;
            if (noteName.includes('bb')) alt = -2;
            else if (noteName.includes('b')) alt = -1;
            else if (noteName.includes('x')) alt = 2;
            else if (noteName.includes('#')) alt = 1;
            const pitch = (LETTER_PITCHES[letterIdx] + alt + 12) % 12;
            return { letter, letterIdx, alt, pitch };
        };

        // Algoritmo de Ortografía Diatónica
        const spellNote = (letterIdx, targetPitch) => {
            const basePitch = LETTER_PITCHES[letterIdx];
            let diff = targetPitch - basePitch;
            while (diff > 6) diff -= 12;
            while (diff < -5) diff += 12;
            
            const letter = LETTERS[letterIdx];
            if (diff === 0) return letter;
            if (diff === 1) return letter + '#';
            if (diff === 2) return letter + 'x';
            if (diff === -1) return letter + 'b';
            if (diff === -2) return letter + 'bb';
            return letter; 
        };

        const FREE_SCALES = ['major', 'natural_minor', 'major_pentatonic', 'minor_pentatonic', 'blues', 'dorian'];

            spanish_eight_tone: { name: 'Spanish 8-Tone', intervals: [0, 1, 3, 4, 5, 6, 8, 10], steps: [1, 2, 1, 1, 1, 2, 2, 2], degrees: [0, 1, 2, 2, 3, 4, 5, 6] }

        const INTERVAL_NAMES = { 0: 'P1', 1: 'm2', 2: 'M2', 3: 'm3', 4: 'M3', 5: 'P4', 6: 'd5/A4', 7: 'P5', 8: 'm6', 9: 'M6', 10: 'm7', 11: 'M7', 12: 'P8' };
        const THEME_COLORS = { 0: 'rose', 1: 'orange', 2: 'amber', 3: 'yellow', 4: 'lime', 5: 'emerald', 6: 'teal', 7: 'cyan', 8: 'sky', 9: 'indigo', 10: 'violet', 11: 'fuchsia' };

        const getNoteIndex = (note) => parseNote(note).pitch;
        const getKeyColor = (root) => THEME_COLORS[getNoteIndex(root)] || 'purple';

        const getScaleNotes = (rootName, scaleKey) => {
            const root = parseNote(rootName);
            const scale = SCALES[scaleKey];
            const notes = [];
            
            const degrees = scale.degrees || scale.intervals.map((_, i) => i); 
            
            scale.intervals.forEach((interval, i) => {
                const chromaticIdx = (root.pitch + interval) % 12;
                const targetLetterIdx = (root.letterIdx + degrees[i]) % 7;
                
                notes.push({
                    note: spellNote(targetLetterIdx, chromaticIdx),
                    intervalName: INTERVAL_NAMES[interval] || '?',
                    semitonesFromRoot: interval,
                    stepToNext: scale.steps[i] || 0,
                    degree: degrees[i] + 1,
                    chromaticIndex: chromaticIdx
                });
            });
            return notes;
        };

        const getDiatonicChords = (scaleNotes, scaleKey) => {
            if (scaleNotes.length !== 7) return [];
            return scaleNotes.map((rootNote, i) => {
                const indices = [0, 2, 4, 6, 8, 10, 12].map(offset => (i + offset) % scaleNotes.length);
                const stack = indices.map(idx => scaleNotes[idx]);
                const third = stack[1], fifth = stack[2], seventh = stack[3];
                const dist3 = (third.semitonesFromRoot - rootNote.semitonesFromRoot + 12) % 12;
                const dist5 = (fifth.semitonesFromRoot - rootNote.semitonesFromRoot + 12) % 12;
                const dist7 = (seventh.semitonesFromRoot - rootNote.semitonesFromRoot + 12) % 12;
                let baseQuality = '', ext7 = '';
                if (dist3 === 4 && dist5 === 7) { baseQuality = ''; ext7 = dist7 === 11 ? 'maj7' : '7'; }
                else if (dist3 === 3 && dist5 === 7) { baseQuality = 'm'; ext7 = dist7 === 10 ? '7' : 'maj7'; }
                else if (dist3 === 3 && dist5 === 6) { baseQuality = 'dim'; ext7 = dist7 === 10 ? 'm7b5' : 'dim7'; }
                else if (dist3 === 4 && dist5 === 8) { baseQuality = 'aug'; ext7 = 'maj7#5'; }
                else if (dist3 === 4 && dist5 === 6) { baseQuality = 'b5'; ext7 = '7b5'; }
                else { baseQuality = '(?)'; ext7 = '7?'; }
                const generateName = (complexity) => {
                    if (complexity === 3) return `${rootNote.note}${baseQuality}`;
                    let suffix = ext7;
                    if (complexity === 4) return `${rootNote.note}${baseQuality}${suffix.replace('maj', 'M').replace('dim7', 'dim7')}`;
                    let extNum = complexity === 5 ? '9' : complexity === 6 ? '11' : '13';
                    if (suffix.includes('maj7')) return `${rootNote.note}${baseQuality}${suffix.replace('maj7', 'M' + extNum)}`;
                    if (baseQuality === 'm' && suffix === '7') return `${rootNote.note}m${extNum}`;
                    if (baseQuality === '' && suffix === '7') return `${rootNote.note}${extNum}`;
                    if (suffix === 'm7b5') return `${rootNote.note}m${extNum}b5`;
                    return `${rootNote.note}${baseQuality}${extNum}`;
                };
                return { root: rootNote.note, notes: stack.map(n => n.note), names: { 3: generateName(3), 4: generateName(4), 5: generateName(5), 6: generateName(6), 7: generateName(7) } };
            });
        };

        let audioCtx = null;
        const initAudio = () => {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) audioCtx = new AudioContext();
            }
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        };

        const playTone = (freq, duration, type = 'sine') => {
            const ctx = initAudio();
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gainNode.gain.setValueAtTime(0, ctx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.1, ctx.currentTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
            osc.connect(gainNode);
            gainNode.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + duration);
        };

        const playGuitarTone = (freq, duration) => {
            const ctx = initAudio();
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            const filter = ctx.createBiquadFilter();
            osc.type = 'sawtooth';
            osc.frequency.value = freq;
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(3000, ctx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(500, ctx.currentTime + 0.2);
            gainNode.gain.setValueAtTime(0, ctx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.02);
            gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
            osc.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + duration);
        };

        const getFreq = (noteName, octave = 4) => {
            const parsed = parseNote(noteName);
            const semitonesFromA4 = parsed.pitch - 9 + (octave - 4) * 12;
            return 440 * Math.pow(2, semitonesFromA4 / 12);
        };

        const midiToFreq = (midi) => 440 * Math.pow(2, (midi - 69) / 12);

        const GUITAR_STRINGS = [
            { name: 'E', openMidi: 40 }, { name: 'A', openMidi: 45 }, { name: 'D', openMidi: 50 },
            { name: 'G', openMidi: 55 }, { name: 'B', openMidi: 59 }, { name: 'e', openMidi: 64 },
        ];
        const normalizeNote = (note) => {
            const parsed = parseNote(note);
            if (parsed.pitch === 1) return 'C#';
            if (parsed.pitch === 3) return 'Eb';
            if (parsed.pitch === 6) return 'F#';
            if (parsed.pitch === 8) return 'G#';
            if (parsed.pitch === 10) return 'Bb';
            return ['C','C#','D','Eb','E','F','F#','G','G#','A','Bb','B'][parsed.pitch];
        };

        const STANDARD_VOICINGS = {
            'C_major': [-1, 3, 2, 0, 1, 0], 'D_major': [-1, -1, 0, 2, 3, 2], 'E_major': [0, 2, 2, 1, 0, 0],
            'F_major': [1, 3, 3, 2, 1, 1], 'G_major': [3, 2, 0, 0, 0, 3], 'A_major': [-1, 0, 2, 2, 2, 0],
            'B_major': [-1, 2, 4, 4, 4, 2], 'C_minor': [-1, 3, 5, 5, 4, 3], 'D_minor': [-1, -1, 0, 2, 3, 1],
            'E_minor': [0, 2, 2, 0, 0, 0], 'F_minor': [1, 3, 3, 1, 1, 1], 'G_minor': [3, 5, 5, 3, 3, 3],
            'A_minor': [-1, 0, 2, 2, 1, 0], 'B_minor': [-1, 2, 4, 4, 3, 2], 'C_7': [-1, 3, 2, 3, 1, 0],
            'D_7': [-1, -1, 0, 2, 1, 2], 'E_7': [0, 2, 0, 1, 0, 0], 'F_7': [1, 3, 1, 2, 1, 1],
            'G_7': [3, 2, 0, 0, 0, 1], 'A_7': [-1, 0, 2, 0, 2, 0], 'B_7': [-1, 2, 1, 2, 0, 2],
            'C_maj7': [-1, 3, 2, 0, 0, 0], 'D_maj7': [-1, -1, 0, 2, 2, 2], 'E_maj7': [0, 2, 1, 1, 0, 0],
            'F_maj7': [-1, -1, 3, 2, 1, 0], 'G_maj7': [3, 2, 0, 0, 0, 2], 'A_maj7': [-1, 0, 2, 1, 2, 0],
            'D_m7': [-1, -1, 0, 2, 1, 1], 'E_m7': [0, 2, 0, 0, 0, 0], 'A_m7': [-1, 0, 2, 0, 1, 0], 'B_m7': [-1, 2, 0, 2, 0, 2]
        };

        const getChordQuality = (notes, root) => {
            const rootIdx = getNoteIndex(root);
            const semitones = notes.map(n => (getNoteIndex(n) - rootIdx + 12) % 12);
            if (semitones.includes(4) && semitones.includes(11)) return 'maj7';
            if (semitones.includes(4) && semitones.includes(10)) return '7';
            if (semitones.includes(3) && semitones.includes(10)) return 'm7';
            if (semitones.includes(3)) return 'minor';
            if (semitones.includes(4)) return 'major';
            if (semitones.includes(6) && semitones.includes(3)) return 'dim';
            return 'major';
        };

        const generateGuitarVoicing = (chordNotes, root) => {
            const normRoot = normalizeNote(root);
            const quality = getChordQuality(chordNotes, root);
            const lookupKey = `${normRoot}_${quality}`;
            if (chordNotes.length <= 4 && STANDARD_VOICINGS[lookupKey]) return STANDARD_VOICINGS[lookupKey];
            if (chordNotes.length <= 4) {
                const rootIdx = getNoteIndex(root);
                let eRootFret = (rootIdx - getNoteIndex('E') + 12) % 12;
                let aRootFret = (rootIdx - getNoteIndex('A') + 12) % 12;
                const buildBarre = (rootString, fret, type) => {
                    let shape = [];
                    if (rootString === 0) {
                        if (type === 'major') shape = [0, 2, 2, 1, 0, 0];
                        else if (type === 'minor') shape = [0, 2, 2, 0, 0, 0];
                        else if (type === '7') shape = [0, 2, 0, 1, 0, 0];
                        else if (type === 'm7') shape = [0, 2, 0, 0, 0, 0];
                        else if (type === 'maj7') shape = [0, 2, 1, 1, 0, 0];
                        else shape = [0, 2, 2, 1, 0, 0];
                    } else {
                        if (type === 'major') shape = [-1, 0, 2, 2, 2, 0];
                        else if (type === 'minor') shape = [-1, 0, 2, 2, 1, 0];
                        else if (type === '7') shape = [-1, 0, 2, 0, 2, 0];
                        else if (type === 'm7') shape = [-1, 0, 2, 0, 1, 0];
                        else if (type === 'maj7') shape = [-1, 0, 2, 1, 2, 0];
                        else shape = [-1, 0, 2, 2, 2, 0];
                    }
                    return shape.map(s => (s === -1 ? -1 : s + fret));
                };
                const useAShape = ['A#', 'Bb', 'B', 'C', 'C#', 'Db', 'D', 'D#', 'Eb'].includes(normRoot);
                if (useAShape) return buildBarre(1, aRootFret, quality);
                else return buildBarre(0, eRootFret, quality);
            }
            const targetPitches = chordNotes.map(n => getNoteIndex(n));
            const rootPitch = getNoteIndex(root);
            let anchorFret = 0, lowestStringIdx = 0, foundBass = false;
            for(let f=0; f<=5; f++) { if ((GUITAR_STRINGS[0].openMidi + f) % 12 === rootPitch) { anchorFret = f; lowestStringIdx = 0; foundBass = true; break; } }
            if (!foundBass) { for(let f=0; f<=5; f++) { if ((GUITAR_STRINGS[1].openMidi + f) % 12 === rootPitch) { anchorFret = f; lowestStringIdx = 1; foundBass = true; break; } } }
            if (!foundBass) anchorFret = 0;
            const minFret = anchorFret;
            const maxFret = Math.max(3, anchorFret + 4);
            const voicing = [];
            GUITAR_STRINGS.forEach((string, sIdx) => {
                if (sIdx < lowestStringIdx) { voicing.push(-1); return; }
                let bestFret = -1;
                if (targetPitches.includes((string.openMidi) % 12)) bestFret = 0;
                if (sIdx === lowestStringIdx) { voicing.push(anchorFret); return; }
                for (let f = minFret; f <= maxFret; f++) {
                    if (bestFret === 0 && f > 0) continue;
                    if (targetPitches.includes((string.openMidi + f) % 12)) { bestFret = f; break; }
                }
                voicing.push(bestFret);
            });
            return voicing;
        };

        const FIFTHS_ORDER = ['C', 'G', 'D', 'A', 'E', 'B', 'F#', 'Db', 'Ab', 'Eb', 'Bb', 'F'];
        
        const KEY_SIGS_MAJOR = { 
            'Cb': {c:7, t:'f'}, 'Gb': {c:6, t:'f'}, 'Db': {c:5, t:'f'}, 'Ab': {c:4, t:'f'}, 'Eb': {c:3, t:'f'}, 'Bb': {c:2, t:'f'}, 'F': {c:1, t:'f'},
            'C': {c:0, t:'s'}, 
            'G': {c:1, t:'s'}, 'D': {c:2, t:'s'}, 'A': {c:3, t:'s'}, 'E': {c:4, t:'s'}, 'B': {c:5, t:'s'}, 'F#': {c:6, t:'s'}, 'C#': {c:7, t:'s'}
        };
        const ENHARMONIC_KEYS = { 'D#': 'Eb', 'G#': 'Ab', 'A#': 'Bb', 'E#': 'F', 'B#': 'C', 'Fb': 'E' };

        const MODE_OFFSETS = {
            dorian: {semi: -2, step: -1}, phrygian: {semi: -4, step: -2}, lydian: {semi: -5, step: -3},
            mixolydian: {semi: -7, step: -4}, natural_minor: {semi: -9, step: -5}, locrian: {semi: -11, step: -6}
        };
        const USE_MINOR_KEY_SIG = ['harmonic_minor', 'melodic_minor', 'minor_pentatonic', 'blues'];

        const getKeySignature = (rootName, scaleKey) => {
            const root = parseNote(rootName);
            let targetSemiOffset = 0;
            let targetStepOffset = 0;

            if (MODE_OFFSETS[scaleKey]) {
                targetSemiOffset = MODE_OFFSETS[scaleKey].semi;
                targetStepOffset = MODE_OFFSETS[scaleKey].step;
            } else if (USE_MINOR_KEY_SIG.includes(scaleKey) || SCALES[scaleKey].intervals.includes(3)) {
                targetSemiOffset = -9;
                targetStepOffset = -5;
            }
            
            const relLetterIdx = (root.letterIdx + targetStepOffset + 7) % 7;
            const relPitch = (root.pitch + targetSemiOffset + 12) % 12;
            const relName = spellNote(relLetterIdx, relPitch);

            let sig = KEY_SIGS_MAJOR[relName];
            if (!sig && ENHARMONIC_KEYS[relName]) sig = KEY_SIGS_MAJOR[ENHARMONIC_KEYS[relName]];
            
            return sig || { c: 0, t: 's' };
        };

        const KeySignatureDisplay = ({ sig, color }) => {
            if (!sig || sig.c === 0) return null;
            const sharpPos = [10, 17.5, 5, 15, 22.5, 12.5, 20]; 
            const flatPos = [20, 12.5, 22.5, 15, 25, 17.5, 27.5]; 
            const positions = sig.t === 's' ? sharpPos : flatPos;
            const symbol = sig.t === 's' ? '♯' : '♭';
            const activePos = positions.slice(0, sig.c);
            const yOffset = sig.t === 's' ? 4 : 2;
            return (
                <div className="flex justify-center items-center h-8 mt-1 overflow-visible">
                    <svg width={Math.max(40, sig.c * 8 + 10)} height="40" viewBox={`0 0 ${Math.max(40, sig.c * 8 + 10)} 40`}>
                        {[10, 15, 20, 25, 30].map(y => <line key={y} x1="0" y1={y} x2="100%" y2={y} stroke="#cbd5e1" strokeWidth="1" />)}
                        {activePos.map((y, i) => (
                            <text key={i} x={5 + i * 8} y={y + yOffset} fontSize="14" className={`fill-${color}-500 font-bold`} style={{ fontFamily: 'serif' }}>
                                {symbol}
                            </text>
                        ))}
                    </svg>
                </div>
            );
        };

        const CircleOfFifths = ({ root, scaleKey, currentNotes, onRootChange, color, t }) => {
            let normRoot = root;
            const map = { 'C#': 'Db', 'D#': 'Eb', 'G#': 'Ab', 'A#': 'Bb', 'Gb': 'F#' };
            if (map[root]) normRoot = map[root];
            let rootIndex = FIFTHS_ORDER.indexOf(normRoot);
            if (rootIndex === -1) { if (root === 'Gb') rootIndex = FIFTHS_ORDER.indexOf('F#'); if (root === 'Cb') rootIndex = FIFTHS_ORDER.indexOf('B'); }
            const rotation = -(rootIndex * 30);
            const activePitches = currentNotes.map(n => n.chromaticIndex);
            const rootPitch = getNoteIndex(root);
            const keySig = getKeySignature(root, scaleKey);
            return (
                <div className="flex flex-col items-center justify-center p-4">
                    <h3 className="text-sm font-semibold text-slate-400 mb-2 uppercase tracking-wide">{t('circleOfFifths')}</h3>
                    <div className="relative w-64 h-64">
                        <div className="w-full h-full transition-transform duration-700 ease-out" style={{ transform: `rotate(${rotation}deg)` }}>
                            <svg viewBox="0 0 200 200" className="w-full h-full drop-shadow-md">
                                {FIFTHS_ORDER.map((note, i) => {
                                    const startAngle = (i * 30) - 15 - 90, endAngle = (i * 30) + 15 - 90;
                                    const x1 = 100 + 100 * Math.cos(startAngle * Math.PI / 180), y1 = 100 + 100 * Math.sin(startAngle * Math.PI / 180);
                                    const x2 = 100 + 100 * Math.cos(endAngle * Math.PI / 180), y2 = 100 + 100 * Math.sin(endAngle * Math.PI / 180);
                                    const x1_in = 100 + 60 * Math.cos(startAngle * Math.PI / 180), y1_in = 100 + 60 * Math.sin(startAngle * Math.PI / 180);
                                    const x2_in = 100 + 60 * Math.cos(endAngle * Math.PI / 180), y2_in = 100 + 60 * Math.sin(endAngle * Math.PI / 180);
                                    const d = `M ${x1} ${y1} A 100 100 0 0 1 ${x2} ${y2} L ${x2_in} ${y2_in} A 60 60 0 0 0 ${x1_in} ${y1_in} Z`;
                                    const notePitch = getNoteIndex(note);
                                    const isNoteActive = activePitches.includes(notePitch), isRoot = notePitch === rootPitch;
                                    const sliceColor = isRoot ? 'currentColor' : isNoteActive ? '#e2e8f0' : '#f8fafc';
                                    
                                    const textX = 100 + 80 * Math.cos(((i * 30) - 90) * Math.PI / 180);
                                    const textY = 100 + 80 * Math.sin(((i * 30) - 90) * Math.PI / 180);

                                    return (
                                        <g key={note} onClick={(e) => { e.stopPropagation(); onRootChange(note); }} className={`cursor-pointer transition-colors duration-300 ${isRoot ? `text-${color}-500` : 'text-slate-200'}`}>
                                            <path d={d} fill={sliceColor} stroke="white" strokeWidth="1" className="pointer-events-auto hover:opacity-80"/>
                                            <text x={textX} y={textY} textAnchor="middle" dominantBaseline="middle" className={`text-[10px] font-bold pointer-events-none transition-transform duration-700 ease-out ${isRoot ? 'fill-white' : isNoteActive ? 'fill-slate-600' : 'fill-slate-300'}`} transform={`rotate(${-rotation} ${textX} ${textY})`}>{note}</text>
                                        </g>
                                    );
                                })}
                            </svg>
                        </div>
                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                            <div className={`w-24 h-24 rounded-full bg-white shadow-sm flex flex-col items-center justify-center z-10 border-4 border-${color}-100`}>
                                <div className="text-center transform translate-y-1">
                                    <span className={`block text-2xl font-bold text-${color}-600 leading-none`}>{root}</span>
                                    <KeySignatureDisplay sig={keySig} color={color} />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const GuitarTab = ({ chordNotes, root, t }) => {
            const frets = generateGuitarVoicing(chordNotes, root);
            return (
                <div className="w-full max-w-xs mx-auto p-4 bg-white rounded-xl shadow-sm border border-slate-100 flex items-center justify-center my-4">
                    <div className="relative w-full h-[140px] flex justify-center">
                        {GUITAR_STRINGS.map((_, i) => <div key={i} className="absolute w-full h-px bg-slate-300" style={{ top: `${20 + i * 20}px` }}></div>)}
                        <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                            {frets.map((fret, stringIdx) => (
                                <div key={stringIdx} className="absolute flex items-center justify-center" style={{ top: `${20 + (5 - stringIdx) * 20}px`, transform: 'translateY(-50%)' }}>
                                    {fret === -1 ? <span className="text-slate-300 text-xs font-bold bg-white px-1">x</span> : <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold shadow-sm z-10 ${fret === 0 ? 'bg-white border border-slate-200 text-slate-700' : 'bg-slate-800 text-white'}`}>{fret}</div>}
                                </div>
                            ))}
                        </div>
                        <div className="absolute left-2 top-0 h-full">
                            {GUITAR_STRINGS.map((s, i) => <span key={s.name} className="absolute text-[10px] text-slate-400 font-bold" style={{ top: `${20 + (5 - i) * 20}px`, transform: 'translateY(-50%)' }}>{s.name}</span>)}
                        </div>
                        <div className="absolute bottom-1 right-2 text-[10px] text-slate-300 font-bold tracking-widest">{t('guitar')}</div>
                    </div>
                </div>
            );
        };

        const ScaleTablature = ({ notes, root, scaleKey, color, t, isPremium, setShowPremiumModal }) => {
            const [isPlaying, setIsPlaying] = useState(false);
            const [activeNoteMidi, setActiveNoteMidi] = useState(null);

            const tabNotes = useMemo(() => {
                const rootIdx = getNoteIndex(root);
                const scalePitches = notes.map(n => n.chromaticIndex);

                let anchorFret = -1;
                for(let f=0; f<=11; f++) {
                    if ((GUITAR_STRINGS[0].openMidi + f) % 12 === rootIdx) {
                        anchorFret = f;
                        break;
                    }
                }
                
                const isMinorShape = scaleKey.includes('minor') || scaleKey.includes('pentatonic') || scaleKey.includes('dorian') || scaleKey.includes('phrygian') || scaleKey.includes('locrian') || scaleKey.includes('blues');

                let minFret = anchorFret;
                if (!isMinorShape && anchorFret > 0) minFret = anchorFret - 1;
                
                const maxFret = minFret + 4; 

                const boxNotes = [];
                for (let s = 0; s < GUITAR_STRINGS.length; s++) {
                    const stringOpen = GUITAR_STRINGS[s].openMidi;
                    for (let f = minFret; f <= maxFret; f++) {
                        const midi = stringOpen + f;
                        const cIdx = midi % 12;
                        if (scalePitches.includes(cIdx)) {
                            boxNotes.push({ string: s, fret: f, isRoot: cIdx === rootIdx });
                        }
                    }
                }
                return boxNotes;
            }, [notes, root, scaleKey]);

            const handlePlay = async () => {
                if (isPlaying) return;
                setIsPlaying(true);
                const duration = 0.25; 

                const sortedNotes = [...tabNotes].sort((a, b) => {
                    return (GUITAR_STRINGS[a.string].openMidi + a.fret) - (GUITAR_STRINGS[b.string].openMidi + b.fret);
                });

                for (let i = 0; i < sortedNotes.length; i++) {
                    const note = sortedNotes[i];
                    const midi = GUITAR_STRINGS[note.string].openMidi + note.fret;
                    setActiveNoteMidi(midi);
                    playGuitarTone(midiToFreq(midi), duration * 1.5);
                    await new Promise(r => setTimeout(r, duration * 1000));
                }
                
                setActiveNoteMidi(null);
                setIsPlaying(false);
            };

            return (
                <div className="w-full overflow-x-auto p-4 bg-white rounded-xl shadow-sm border border-slate-100 min-h-[140px] flex items-center justify-center relative mt-4 custom-scrollbar">
                    <div className="absolute top-2 left-2 text-xs font-bold text-slate-400">{t('guitarTabBox')}</div>
                    
                    <div className="absolute top-2 right-2 z-10">
                        <button 
                            onClick={() => {
                                if (!isPremium) {
                                    setShowPremiumModal(true);
                                } else {
                                    handlePlay();
                                }
                            }} 
                            disabled={isPlaying} 
                            className={`px-2 py-1 rounded flex items-center justify-center transition-all gap-1 ${isPlaying ? `bg-${color}-100 text-${color}-400` : !isPremium ? 'bg-slate-50 text-slate-400 hover:bg-slate-200 border border-slate-200' : `bg-white text-${color}-600 hover:bg-${color}-50 border border-${color}-200 shadow-sm`}`}
                        >
                            {!isPremium ? <Lock size={12} /> : isPlaying ? <Volume2 size={12} className="animate-pulse" /> : <Play size={12} />}
                            <span className="text-[9px] font-bold uppercase">{isPlaying ? t('playing') : t('playBox')}</span>
                        </button>
                    </div>

                    <svg width={Math.max(400, tabNotes.length * 35 + 80)} height={120} viewBox={`0 0 ${Math.max(400, tabNotes.length * 35 + 80)} 120`}>
                        {[0, 1, 2, 3, 4, 5].map(i => {
                            const y = 20 + i * 16;
                            return <line key={i} x1="40" y1={y} x2="100%" y2={y} stroke="#cbd5e1" strokeWidth="1" />;
                        })}
                        {[0, 1, 2, 3, 4, 5].map(i => <text key={i} x="10" y={24 + i * 16} fontSize="10" className="fill-slate-400 font-bold">{GUITAR_STRINGS[5 - i].name}</text>)}
                        <line x1="40" y1="20" x2="40" y2={20 + 5 * 16} stroke="#94a3b8" strokeWidth="2" />
                        {tabNotes.map((n, i) => {
                            const x = 70 + i * 35;
                            const y = 20 + (5 - n.string) * 16;
                            const midi = GUITAR_STRINGS[n.string].openMidi + n.fret;
                            const isActive = activeNoteMidi === midi;

                            return (
                                <g key={i}>
                                    <circle cx={x} cy={y} r={isActive ? "11" : "8"} className={`transition-all duration-150 ${isActive ? `fill-${color}-400` : n.isRoot ? `fill-${color}-500` : "fill-white"}`} stroke={n.isRoot || isActive ? "transparent" : "#cbd5e1"} strokeWidth="1.5" />
                                    <text x={x} y={y + 3} fontSize="10" textAnchor="middle" className={`font-bold pointer-events-none transition-colors ${isActive || n.isRoot ? 'fill-white' : 'fill-slate-600'}`}>{n.fret}</text>
                                </g>
                            );
                        })}
                    </svg>
                </div>
            );
        };

        const Staff = ({ notes, isChord = false, t }) => {
            const staffRef = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
            const getStaffY = (note, octave = 4) => {
                const letter = note.charAt(0);
                const stepIndex = staffRef.indexOf(letter);
                const absStep = stepIndex + (octave * 7);
                const diff = (staffRef.indexOf('F') + (5 * 7)) - absStep;
                return 20 + (diff * 5); 
            };
            let currentOctave = 4;
            const renderedNotes = notes.map((n, i) => {
                if (isChord) { if (i > 0) { if (staffRef.indexOf(n.note.charAt(0)) <= staffRef.indexOf(notes[i-1].note.charAt(0))) currentOctave++; } }
                else { if (i > 0 && getNoteIndex(n.note) < getNoteIndex(notes[i-1].note)) currentOctave++; }
                return { ...n, octave: currentOctave, y: getStaffY(n.note, currentOctave) };
            });
            const minY = Math.min(...renderedNotes.map(n => n.y));
            const contentHeight = Math.max(120, Math.abs(minY) + 120);
            const offset = isChord && minY < 20 ? 20 - minY : 0; 
            const viewHeight = Math.max(120, contentHeight);
            const viewWidth = isChord ? 200 : Math.max(400, notes.length * 60);

            return (
                <div className={`w-full overflow-x-auto p-4 bg-white rounded-xl shadow-sm border border-slate-100 min-h-[160px] flex items-center justify-center relative ${isChord ? `max-w-xs mx-auto my-4 border-2 border-slate-100` : ''}`}>
                    {isChord && <div className="absolute top-2 left-2 text-xs font-bold text-slate-400">{t('chord')}</div>}
                    <svg width="100%" height={viewHeight} viewBox={`0 0 ${viewWidth} ${viewHeight}`}>
                        <g transform={`translate(0, ${offset})`}>
                            {[20, 30, 40, 50, 60].map(y => <line key={y} x1="0" y1={y} x2="100%" y2={y} stroke="#94a3b8" strokeWidth="1" />)}
                            {!isChord && <text x="10" y="55" fontSize="40" fontFamily="serif" fill="#1e293b">𝄞</text>}
                            {isChord && <text x="30" y="55" fontSize="40" fontFamily="serif" fill="#1e293b">𝄞</text>}
                            {renderedNotes.map((n, i) => {
                                const xPos = isChord ? 100 : 60 + i * 50; 
                                return (
                                    <g key={i} transform={`translate(${xPos}, 0)`}>
                                        {n.y <= 10 && <line x1="-10" y1="10" x2="10" y2="10" stroke="#94a3b8" strokeWidth="1" />}
                                        {n.y <= 0 && <line x1="-10" y1="0" x2="10" y2="0" stroke="#94a3b8" strokeWidth="1" />}
                                        {n.y <= -10 && <line x1="-10" y1="-10" x2="10" y2="-10" stroke="#94a3b8" strokeWidth="1" />}
                                        {n.y >= 70 && <line x1="-10" y1="70" x2="10" y2="70" stroke="#94a3b8" strokeWidth="1" />}
                                        {n.y >= 80 && <line x1="-10" y1="80" x2="10" y2="80" stroke="#94a3b8" strokeWidth="1" />}
                                        <ellipse cx="0" cy={n.y} rx="8" ry="5.5" fill="white" stroke="#1e293b" strokeWidth="2" transform={`rotate(-15, 0, ${n.y})`} />
                                        {n.note.includes('x') && <text x="-22" y={n.y + 5} fontSize="14" fill="#1e293b" className="font-bold">x</text>}
                                        {n.note.includes('#') && !n.note.includes('x') && <text x="-22" y={n.y + 5} fontSize="16" fill="#1e293b">♯</text>}
                                        {n.note.includes('bb') && <text x="-26" y={n.y + 5} fontSize="16" fill="#1e293b">♭♭</text>}
                                        {n.note.includes('b') && !n.note.includes('bb') && <text x="-22" y={n.y + 5} fontSize="16" fill="#1e293b">♭</text>}
                                        {!isChord && <text x="0" y="100" fontSize="10" textAnchor="middle" fill="#64748b" className="font-medium">{n.note}</text>}
                                    </g>
                                );
                            })}
                        </g>
                    </svg>
                </div>
            );
        };

        function MusicScaleApp() {
            const [root, setRoot] = useState('C');
            const [scaleKey, setScaleKey] = useState('major');
            const [bpm, setBpm] = useState(75);
            const [isPlaying, setIsPlaying] = useState(false);
            const [playingIndex, setPlayingIndex] = useState(null);
            const [chordComplexity, setChordComplexity] = useState(3); // Inicia en tríadas por defecto
            const [selectedChordIndex, setSelectedChordIndex] = useState(null);
            const [chordViewMode, setChordViewMode] = useState('staff');
            const [isScaleMenuOpen, setIsScaleMenuOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');

            // Estado Premium & I18N
            const [isPremium, setIsPremium] = useState(false);
            const [showPremiumModal, setShowPremiumModal] = useState(false);
            const [lang, setLang] = useState('en');

            const t = (key) => TRANSLATIONS[lang][key] || key;

            const notes = getScaleNotes(root, scaleKey);
            const chords = getDiatonicChords(notes, scaleKey);
            const color = getKeyColor(root);

            const filteredScales = useMemo(() => {
                const term = searchTerm.toLowerCase();
                return Object.keys(SCALES).filter(k => translateScaleName(SCALES[k].name, lang).toLowerCase().includes(term));
            }, [searchTerm, lang]);
            
            useEffect(() => {
                const closeMenu = (e) => { if (!e.target.closest('.scale-selector')) setIsScaleMenuOpen(false); };
                document.addEventListener('click', closeMenu);
                return () => document.removeEventListener('click', closeMenu);
            }, []);

            useEffect(() => { setSelectedChordIndex(null); }, [root, scaleKey]);

            useEffect(() => { if (!isScaleMenuOpen) { setTimeout(() => setSearchTerm(''), 200); } }, [isScaleMenuOpen]);

            const handlePlay = async () => {
                if (isPlaying) return;
                setIsPlaying(true);
                const duration = 60 / bpm; 
                let currentOctave = 4;
                for (let i = 0; i < notes.length; i++) {
                    if (i > 0) { if (getNoteIndex(notes[i].note) < getNoteIndex(notes[i-1].note)) currentOctave++; }
                    setPlayingIndex(i);
                    playTone(getFreq(notes[i].note, currentOctave), duration * 0.8, 'triangle');
                    await new Promise(r => setTimeout(r, duration * 1000));
                }
                setPlayingIndex(notes.length);
                playTone(getFreq(root, currentOctave + (getNoteIndex(notes[notes.length-1].note) < getNoteIndex(root) ? 0 : 1)), duration * 1.5, 'triangle');
                await new Promise(r => setTimeout(r, duration * 1500));
                setPlayingIndex(null);
                setIsPlaying(false);
            };

            const handleChordClick = (index) => {
                const chord = chords[index];
                setSelectedChordIndex(index);
                const notesToPlay = chord.notes.slice(0, chordComplexity);
                if (chordViewMode === 'guitar') {
                    const voicing = generateGuitarVoicing(notesToPlay, chord.root);
                    voicing.forEach((fret, stringIdx) => {
                        if (fret !== -1) { setTimeout(() => { playGuitarTone(midiToFreq(GUITAR_STRINGS[stringIdx].openMidi + fret), 2.5); }, stringIdx * 40); }
                    });
                } else {
                    let currentOctave = 4, prevNoteIndex = -1;
                    notesToPlay.forEach((n, i) => {
                        const noteIdx = getNoteIndex(n);
                        if (i > 0 && noteIdx <= prevNoteIndex) currentOctave++;
                        prevNoteIndex = noteIdx;
                        setTimeout(() => playTone(getFreq(n, currentOctave), 1.5, 'sine'), i * 30);
                    });
                }
            };

            const selectedChord = selectedChordIndex !== null ? chords[selectedChordIndex] : null;
            const selectedChordNotes = selectedChord ? selectedChord.notes.slice(0, chordComplexity) : [];
            const selectedChordNotesForStaff = selectedChordNotes.map(n => ({ note: n }));

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 font-sans pb-20 transition-colors duration-300">
                    <div className="sticky top-0 bg-white/90 backdrop-blur-sm border-b border-slate-200 z-50">
                        <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <button onClick={() => window.history.back()} className="p-2 hover:bg-slate-100 rounded-full"><ChevronDown className="rotate-90 text-slate-500 w-6 h-6" /></button>
                            </div>
                            <div className="flex items-center gap-3">
                                {/* Language Toggle */}
                                <button 
                                    onClick={() => setLang(lang === 'en' ? 'es' : 'en')}
                                    className="flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-slate-200 bg-slate-50 hover:bg-slate-100 text-xs font-bold text-slate-600 transition-colors mr-2"
                                >
                                    <Globe size={14} />
                                    <span>{lang === 'en' ? 'ES' : 'EN'}</span>
                                </button>

                                <div className="relative group">
                                    <button className={`w-10 h-10 rounded-full bg-${color}-100 text-${color}-700 font-bold flex items-center justify-center border-2 border-${color}-200 hover:bg-${color}-200 transition-colors`}>{root}</button>
                                    <div className="absolute top-full right-0 mt-2 bg-white rounded-lg shadow-xl border border-slate-100 p-2 grid grid-cols-4 gap-1 w-48 hidden group-hover:grid">
                                        {['C', 'C#', 'Db', 'D', 'Eb', 'E', 'F', 'F#', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'].map(n => <button key={n} onClick={() => setRoot(n)} className={`p-2 text-sm rounded hover:bg-slate-50 ${root === n ? `bg-${color}-100 text-${color}-700 font-bold` : ''}`}>{n}</button>)}
                                    </div>
                                </div>
                                <button onClick={handlePlay} disabled={isPlaying} className={`w-10 h-10 rounded-full flex items-center justify-center transition-all ${isPlaying ? `bg-${color}-300` : `bg-${color}-600 hover:bg-${color}-700 text-white shadow-lg shadow-${color}-200`}`}>{isPlaying ? <Volume2 size={20} className="animate-pulse" /> : <Play size={20} className="ml-1" />}</button>
                            </div>
                        </div>
                    </div>

                    <main className="max-w-6xl mx-auto px-4 pt-6 space-y-8">
                        
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                            <div className="lg:col-span-5 space-y-6">
                                <div className="flex flex-col items-start">
                                    <div className="flex items-center gap-4 mb-2">
                                        <div className="h-16 w-16 rounded-2xl overflow-hidden shadow-lg border border-slate-100 bg-white">
                                            <img src="logo.jpg" alt="ScaleMaster" className="h-full w-full object-cover" onError={(e) => e.target.src='https://ui-avatars.com/api/?name=Scale+Master&background=a855f7&color=fff&size=128'} />
                                        </div>
                                        <div>
                                            <h1 className="text-3xl font-bold text-slate-900">ScaleMaster</h1>
                                            <p className="text-slate-500 text-sm">{t('subtitle')}</p>
                                        </div>
                                    </div>
                                    <p className="text-xs text-slate-400 mt-1 font-mono pl-1">{t('createdBy')} Carlos David <a href="https://cdcruzher.github.io/cdcruzher/" target="_blank" className={`text-${color}-500 hover:text-${color}-600 font-bold transition-colors`}>@cdcruzher</a></p>
                                </div>

                                <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm relative z-20">
                                    <div className="flex items-center justify-between mb-4"><h2 className="text-xs font-bold text-slate-400 uppercase tracking-widest">{t('selectedScale')}</h2></div>
                                    <div className="flex items-center gap-3 mb-4">
                                        <h1 className="text-3xl font-bold text-slate-800 tracking-tight">{root} {translateScaleName(SCALES[scaleKey].name, lang)}</h1>
                                    </div>
                                    
                                    <div className="relative w-full scale-selector">
                                        <button 
                                            onClick={(e) => { e.stopPropagation(); setIsScaleMenuOpen(!isScaleMenuOpen); }} 
                                            className="flex items-center justify-between w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg hover:bg-slate-100 transition-colors text-slate-700 font-medium"
                                        >
                                            <span>{t('changeScale')}</span>
                                            <ChevronDown size={16} className={`text-slate-400 transition-transform duration-200 ${isScaleMenuOpen ? 'rotate-180' : ''}`}/>
                                        </button>
                                        
                                        {isScaleMenuOpen && (
                                            <div className="absolute top-full left-0 mt-2 bg-white rounded-lg shadow-xl border border-slate-100 p-2 max-h-96 w-full z-30 flex flex-col">
                                                <div className="px-2 pb-2 border-b border-slate-50 mb-1 sticky top-0 bg-white z-10" onClick={e => e.stopPropagation()}>
                                                    <div className="relative">
                                                        <Search size={14} className="absolute left-3 top-3 text-slate-400" />
                                                        <input 
                                                            type="text" 
                                                            placeholder={t('searchPlaceholder')} 
                                                            className="w-full bg-slate-50 border border-slate-200 rounded-md pl-9 pr-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-100"
                                                            value={searchTerm}
                                                            onChange={(e) => setSearchTerm(e.target.value)}
                                                            autoFocus
                                                        />
                                                    </div>
                                                </div>
                                                <div className="overflow-y-auto flex-1">
                                                    {filteredScales.length > 0 ? (
                                                        filteredScales.map(k => {
                                                            const isFree = FREE_SCALES.includes(k);
                                                            const isLocked = !isFree && !isPremium;
                                                            return (
                                                                <button 
                                                                    key={k} 
                                                                    onClick={() => { 
                                                                        if (isLocked) {
                                                                            setShowPremiumModal(true);
                                                                            setIsScaleMenuOpen(false);
                                                                        } else {
                                                                            setScaleKey(k); 
                                                                            setIsScaleMenuOpen(false); 
                                                                        }
                                                                    }} 
                                                                    className={`w-full text-left px-3 py-2 text-sm rounded flex items-center justify-between ${scaleKey === k ? `bg-${color}-100 text-${color}-700 font-bold` : isLocked ? 'text-slate-400 hover:bg-slate-50' : `hover:bg-${color}-50 text-slate-700`}`}
                                                                >
                                                                    <span>{translateScaleName(SCALES[k].name, lang)}</span>
                                                                    {isLocked && <Lock size={14} className="text-slate-300" />}
                                                                </button>
                                                            );
                                                        })
                                                    ) : (
                                                        <div className="p-4 text-center text-xs text-slate-400">{t('noScales')}</div>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-7 flex justify-center lg:justify-end">
                                <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 w-full flex justify-center max-w-md">
                                    <CircleOfFifths root={root} scaleKey={scaleKey} currentNotes={notes} onRootChange={setRoot} color={color} t={t} />
                                </div>
                            </div>
                        </div>

                        <section>
                            <div className="flex items-center justify-between mb-4"><h2 className="text-lg font-bold text-slate-800">{t('intervallicStructure')}</h2></div>
                            <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 overflow-x-auto custom-scrollbar">
                                <div className="flex items-start min-w-max space-x-1 justify-between md:justify-start md:space-x-8">
                                    {notes.map((note, idx) => {
                                        const isCurrent = idx === playingIndex;
                                        return (
                                            <div key={idx} className="flex flex-col items-center relative group">
                                                <div className={`w-12 h-12 rounded-full flex flex-col items-center justify-center text-xs mb-3 z-10 transition-all duration-300 ${isCurrent ? `bg-${color}-500 text-white scale-110 shadow-lg ring-4 ring-${color}-200` : (idx === 0 ? `bg-${color}-200 text-${color}-900 font-bold` : `bg-${color}-100 text-${color}-800`)}`}>
                                                    <span className="font-bold text-sm">{note.intervalName}</span><span className="text-[10px] opacity-60">{note.semitonesFromRoot}</span>
                                                </div>
                                                <div className="text-lg font-bold text-slate-700 mb-1">{note.note}</div>
                                                <div className="w-6 h-6 rounded-full bg-slate-100 text-slate-400 flex items-center justify-center text-xs font-bold">{note.degree}</div>
                                            </div>
                                        );
                                    })}
                                    <div className={`flex flex-col items-center relative ml-[-10px] transition-all duration-300 ${playingIndex === notes.length ? 'opacity-100 scale-105' : 'opacity-50'}`}>
                                        <div className={`w-12 h-12 rounded-full border flex flex-col items-center justify-center text-xs mb-3 transition-colors duration-300 ${playingIndex === notes.length ? `bg-${color}-500 text-white border-transparent shadow-lg ring-4 ring-${color}-200` : 'bg-slate-50 border-slate-200 text-slate-500'}`}><span className="font-bold">P8</span></div>
                                        <div className="text-lg font-bold text-slate-300 mb-1">{root}</div><div className="w-6 h-6 rounded-full bg-slate-50 text-slate-300 flex items-center justify-center text-xs font-bold">8</div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section>
                            <div className="flex items-center justify-between mb-4"><h2 className="text-lg font-bold text-slate-800">{t('notationTab')}</h2></div>
                            <div className="space-y-4">
                                <Staff notes={notes} t={t} />
                                <ScaleTablature notes={notes} root={root} scaleKey={scaleKey} color={color} t={t} isPremium={isPremium} setShowPremiumModal={setShowPremiumModal} />
                            </div>
                        </section>

                        <section className="pb-10 relative">
                            <div className="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-4">
                                <h2 className="text-lg font-bold text-slate-800">{t('diatonicHarmonization')}</h2>
                                <div className="flex overflow-x-auto gap-1 bg-slate-100 rounded-lg p-1 self-start md:self-auto">
                                    {[3, 4, 5, 6, 7].map(num => {
                                        const isLocked = num > 3 && !isPremium;
                                        return (
                                            <button 
                                                key={num} 
                                                onClick={() => {
                                                    if (isLocked) {
                                                        setShowPremiumModal(true);
                                                    } else {
                                                        setChordComplexity(num);
                                                    }
                                                }} 
                                                className={`flex-1 min-w-[60px] px-3 py-1 text-xs font-bold rounded-md transition-all whitespace-nowrap flex items-center justify-center gap-1 ${chordComplexity === num ? `bg-white text-${color}-700 shadow-sm ring-1 ring-${color}-100` : isLocked ? 'text-slate-400 hover:bg-slate-200 cursor-pointer' : 'text-slate-500 hover:text-slate-700'}`}
                                            >
                                                <span>{num === 3 ? t('triads') : num === 4 ? '7th' : num === 5 ? '9th' : num === 6 ? '11th' : '13th'}</span>
                                                {isLocked && <Lock size={10} className="mb-0.5 opacity-70" />}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-12 gap-6">
                                {selectedChord && (
                                    <div className="md:col-span-12 lg:col-span-4 lg:order-2 animate-in fade-in slide-in-from-right-4 duration-300">
                                        <div className="bg-white rounded-2xl p-4 border-2 border-slate-100 shadow-lg relative">
                                            <div className="flex items-center justify-between mb-4 pb-2 border-b border-slate-50">
                                                <div className="flex items-center gap-3">
                                                    <span className={`text-xl font-bold text-${color}-600`}>{selectedChord.names[chordComplexity]}</span>
                                                </div>
                                                <div className="flex bg-slate-100 rounded-md p-0.5">
                                                    <button onClick={() => setChordViewMode('staff')} className={`px-3 py-1 rounded text-xs font-bold ${chordViewMode === 'staff' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-400'}`}>{t('staff')}</button>
                                                    <button onClick={() => setChordViewMode('guitar')} className={`px-3 py-1 rounded text-xs font-bold ${chordViewMode === 'guitar' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-400'}`}>{t('guitar')}</button>
                                                </div>
                                                <button onClick={() => setSelectedChordIndex(null)} className="absolute -top-2 -right-2 bg-white rounded-full p-1 shadow-md text-slate-400 hover:text-slate-600 border border-slate-100"><X size={16}/></button>
                                            </div>
                                            {chordViewMode === 'staff' ? <Staff notes={selectedChordNotesForStaff} isChord={true} t={t} /> : <GuitarTab chordNotes={selectedChordNotes} root={selectedChord.root} t={t} />}
                                        </div>
                                    </div>
                                )}

                                <div className={`${selectedChord ? 'md:col-span-12 lg:col-span-8 lg:order-1' : 'md:col-span-12'}`}>
                                    {chords.length > 0 ? (
                                        <div className="grid grid-cols-4 md:grid-cols-7 gap-3">
                                            {chords.map((chord, i) => (
                                                <button key={i} onClick={() => handleChordClick(i)} className={`transition-all border rounded-xl p-2 flex flex-col items-center justify-center min-h-[90px] relative overflow-hidden group ${selectedChordIndex === i ? `bg-${color}-100 border-${color}-300 ring-2 ring-${color}-200` : `bg-white hover:bg-${color}-50 border-slate-200 active:scale-95 hover:shadow-md`}`}>
                                                    <span className="text-[10px] font-bold text-slate-400 mb-1 absolute top-2 right-2">{['I', 'II', 'III', 'IV', 'V', 'VI', 'VII'][i]}</span>
                                                    <span className={`font-bold text-slate-700 text-center leading-tight mt-2 ${chord.names[chordComplexity].length > 5 ? 'text-xs' : 'text-sm'}`}>{chord.names[chordComplexity]}</span>
                                                    <span className={`text-[10px] text-${color}-400 opacity-0 group-hover:opacity-100 transition-opacity mt-1`}>{t('play')}</span>
                                                </button>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="text-center p-8 bg-slate-50 rounded-xl border border-dashed border-slate-200 text-slate-400">
                                            {t('harmonizationUnavailable')}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </section>

                        <div className="mt-12 pt-8 border-t border-slate-200 flex flex-col items-center pb-8">
                            <p className="text-xs text-slate-400 mb-4 uppercase tracking-wider font-semibold">{t('supportProject')}</p>
                            <a href="https://www.paypal.com/donate/?business=6EN68NHUTM2KQ&no_recurring=0&item_name=Thanks+for+your+support+Amigo%21&currency_code=USD" target="_blank" className="block w-32 h-32 bg-white p-2 rounded-xl border border-slate-200 hover:shadow-lg hover:scale-105 transition-all cursor-pointer">
                                <img src="qrcode.jpg" alt="Donate" className="w-full h-full object-contain" onError={(e) => e.target.src='https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https%3A%2F%2Fwww.paypal.com%2Fdonate%2F%3Fbusiness%3D6EN68NHUTM2KQ%26no_recurring%3D0%26item_name%3DThanks%2Bfor%2Byour%2Bsupport%2BAmigo%21%26currency_code%3DUSD'} />
                            </a>
                            <p className="text-[10px] text-slate-400 mt-3 text-center">{t('scanDonate')}</p>
                        </div>
                    </main>

                    {/* Modal Premium */}
                    {showPremiumModal && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl relative animate-in zoom-in-95 duration-200">
                                <button onClick={() => setShowPremiumModal(false)} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><X size={20}/></button>
                                <div className="flex flex-col items-center text-center mt-4">
                                    <div className="w-16 h-16 bg-amber-100 text-amber-500 rounded-full flex items-center justify-center mb-4">
                                        <Star size={32} />
                                    </div>
                                    <h2 className="text-2xl font-bold text-slate-800 mb-2">{t('unlockPremium')}</h2>
                                    <p className="text-slate-500 mb-6 text-sm">{t('premiumDesc')}</p>
                                    
                                    <div className="w-full space-y-3">
                                        <button onClick={() => { setIsPremium(true); setShowPremiumModal(false); }} className="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-amber-200 transition-all active:scale-95 flex items-center justify-center gap-2">
                                            <Unlock size={18} />
                                            <span>{t('getPremium')}</span>
                                        </button>
                                        <button onClick={() => setShowPremiumModal(false)} className="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 px-4 rounded-xl transition-all">
                                            {t('maybeLater')}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MusicScaleApp />);
    </script>
</body>
</html>
